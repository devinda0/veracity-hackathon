name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        if: ${{ hashFiles('frontend/package-lock.json') != '' }}
        run: npm ci
        working-directory: frontend

      - name: Backend lint placeholder
        run: |
          if [ -f backend/Makefile ]; then
            make -C backend lint
          else
            echo "backend lint placeholder"
          fi

      - name: Frontend lint placeholder
        if: ${{ hashFiles('frontend/package-lock.json') != '' }}
        run: npm run lint
        working-directory: frontend

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        if: ${{ hashFiles('frontend/package-lock.json') != '' }}
        run: npm ci
        working-directory: frontend

      - name: Backend test placeholder
        run: |
          if [ -f backend/Makefile ]; then
            make -C backend test
          else
            echo "backend test placeholder"
          fi

      - name: Frontend test placeholder
        if: ${{ hashFiles('frontend/package-lock.json') != '' }}
        run: npm run build
        working-directory: frontend
